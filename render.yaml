services:
  - type: web
    name: rs-team-bot
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: rs-team-bot
          property: url
