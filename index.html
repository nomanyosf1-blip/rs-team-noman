<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RS TEAM</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('root').innerHTML = '<div style="direction:ltr;background:#000;color:#ef4444;padding:40px;font-family:monospace;font-size:14px;white-space:pre-wrap;">ERROR: ' + msg + '\nLine: ' + line + '\n' + (error && error.stack ? error.stack : '') + '</div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML = '<div style="direction:ltr;background:#000;color:#ef4444;padding:40px;font-family:monospace;font-size:14px;white-space:pre-wrap;">UNHANDLED REJECTION: ' + e.reason + '</div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
